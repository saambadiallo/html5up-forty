name: CD Pipeline - Production

on:
  push:
    branches:
      - prod

env:
  IMAGE_NAME: intranet-newdeal
  IMAGE_TAG: 1.0.0

jobs:

  # 🔹 1. SCAN SÉCURITÉ
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1   # 🔥 bloque si vulnérabilité critique


  # 🔹 2. DEPLOIEMENT PROD
  deploy:
    runs-on: runner_prod
    needs: scan

    steps:
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Pull image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Stop old container
        run: docker stop intranet || true

      - name: Remove old container
        run: docker rm intranet || true

      - name: Run new container
        run: |
          docker run -d \
            -p 80:80 \
            --name intranet \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
