name: CI Pipeline - intranet-newdeal (branche dev)
on:
  push:
    branches: [ dev ]

env:
  IMAGE_NAME: intranet-newdeal
  IMAGE_TAG: 1.0.0

jobs:

  # 🔹 Job 1 : Build de l'image Docker
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG .

  
  # 🔹 Job 3 : Push vers Docker Hub
  push:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG

# 🔹 Job 2 : Scan de l'image avec Trivy
  scan:
    name: Scan Docker Image with Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $IMAGE_NAME:$IMAGE_TAG
          format: table
          exit-code: 0           # 0 = ne bloque pas le pipeline si vulnérabilités trouvées【1†L1203-L1206】
          # Pour bloquer sur CRITICAL : severity: CRITICAL, exit-code: 1

